<section class="mx-auto max-w-7xl px-4 mt-4">
  <div class="grid grid-cols-1 xl:grid-cols-12 space-y-5 xl:space-x-4.25 xl:space-y-0">
    <div class="xl:col-span-2 xl:sticky xl:top-22 h-fit">
      <div class="grid grid-cols-2 gap-x-3 xl:grid-cols-1 bg-white rounded-lg p-3 shadow">
        <button
          routerLink="/feed/homeFeed"
          routerLinkActive="text-light-blue bg-light-blue/10 hover:bg-light-blue/10"
          class="flex flex-wrap items-center w-full gap-2 text-gray-600 font-bold hover:bg-gray-400/20 rounded-lg px-3 py-2 transition-all duration-300 mb-2 cursor-pointer"
        >
          <i class="fa-regular fa-newspaper"></i>
          Feed
        </button>

        <button
          routerLink="/feed/myPosts"
          routerLinkActive="text-light-blue bg-light-blue/10 hover:bg-light-blue/10"
          class="flex flex-wrap items-center w-full gap-2 text-gray-600 font-bold hover:bg-gray-400/20 rounded-lg px-3 py-2 transition-all duration-300 mb-2 cursor-pointer"
        >
          <span><i class="fa-regular fa-file-lines"></i></span>
          My Posts
        </button>

        <button
          routerLink="/feed/community"
          routerLinkActive="text-light-blue bg-light-blue/10 hover:bg-light-blue/10"
          class="flex flex-wrap items-center w-full gap-2 text-gray-600 font-bold hover:bg-gray-400/20 rounded-lg px-3 py-2 transition-all duration-300 mb-2 cursor-pointer"
        >
          <i class="fa-solid fa-earth-americas"></i>
          Community
        </button>
        <button
          routerLink="/feed/saved"
          routerLinkActive="text-light-blue bg-light-blue/10 hover:bg-light-blue/10"
          class="flex flex-wrap items-center w-full gap-2 text-gray-600 font-bold hover:bg-gray-400/20 rounded-lg px-3 py-2 transition-all duration-300 mb-2 cursor-pointer"
        >
          <i class="fa-regular fa-bookmark"></i>
          Saved
        </button>
      </div>
    </div>
    <div class="block xl:hidden">
      <div class="flex flex-col gap-y-3 bg-white rounded-lg p-4 mt-0 shadow">
        <div class="header flex justify-between items-center">
          <div class="flex gap-x-2 items-center">
            <span><i class="fa-solid fa-user-group text-light-blue"></i></span>
            <h2 class="font-bold text-lg">Suggested Friends</h2>
          </div>
          <div class="flex gap-x-3">
            <span class="bg-gray-500/10 font-bold rounded-full px-2 py-0.5 text-xs">5</span>
            <button
              (click)="openSuggestedFriends()"
              class="font-bold text-blue-600/80 text-xs cursor-pointer"
            >
              @if (!isSuggestedOpen) {
                Show
              } @else {
                Hide
              }
            </button>
          </div>
        </div>
        @if (isSuggestedOpen) {
          <div class="relative">
            <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
              <svg
                class="w-4 h-4 text-gray-400"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                fill="none"
                viewBox="0 0 20 20"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-width="2"
                  d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                />
              </svg>
            </div>
            <input
              [(ngModel)]="searchWord"
              type="search"
              id="search"
              (input)="getRecommendedFollowers()"
              class="block w-full p-2.5 ps-9 bg-neutral-secondary-medium border border-default-medium rounded-lg focus:ring-blue-500 focus:border-blue-400/20 focus:bg-white placeholder:text-gray-400 placeholder:text-base"
              placeholder="Search friends..."
            />
          </div>
          @if (isLoading()) {
            @for (item of [1, 2, 3, 4, 5]; track item) {
              <app-post-loading [photo]="false"></app-post-loading>
            }
          } @else {
            @for (item of suggestionsList(); track item._id) {
              <app-single-suggestion
                [item]="item"
                (userFollowed)="getRecommendedFollowers()"
              ></app-single-suggestion>
            }
          }
          <div>
            <button
              routerLink="/suggestions"
              class="cursor-pointer w-full bg-gray-200/30 hover:bg-gray-200/50 transition duration-200 border border-gray-400/20 px-2 py-2 rounded-base text-center font-bold text-gray-600"
            >
              View more
            </button>
          </div>
        }
      </div>
    </div>
    <div class="xl:col-span-7">
      <div class="flex flex-col">
        <div>
          <app-create-post [myProfileData]="myProfileData()"></app-create-post>
        </div>
        <div>
          <router-outlet></router-outlet>
        </div>
      </div>
    </div>
    <div class="hidden xl:block xl:col-span-3 xl:sticky xl:top-22 h-fit">
      <div class="flex flex-col gap-y-3 bg-white rounded-lg px-4 pt-4 pb-3 shadow">
        <div class="header flex justify-between items-center">
          <div class="flex gap-x-2 items-center">
            <span><i class="fa-solid fa-user-group text-light-blue"></i></span>
            <h2 class="font-bold text-md">Suggested Friends</h2>
          </div>
          <span class="bg-gray-500/10 font-bold rounded-full px-2.5 py-0.5 text-sm">5</span>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
            <svg
              class="w-4 h-4 text-gray-400"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              fill="none"
              viewBox="0 0 20 20"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="2"
                d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
              />
            </svg>
          </div>
          <input
            [(ngModel)]="searchWord"
            type="search"
            id="search"
            (input)="getRecommendedFollowers()"
            class="block w-full px-2.5 py-1 ps-9 bg-neutral-secondary-medium border border-default-medium rounded-base focus:ring-blue-500 focus:border-blue-400/20 focus:bg-white placeholder:text-gray-400 placeholder:text-sm"
            placeholder="Search friends..."
          />
        </div>
        @for (item of suggestionsList(); track item._id) {
          <app-single-suggestion
            [item]="item"
            (userFollowed)="getRecommendedFollowers()"
          ></app-single-suggestion>
        }
        <div>
          <button
            routerLink="/suggestions"
            class="cursor-pointer w-full bg-gray-200/30 hover:bg-gray-200/60 transition duration-200 border border-gray-400/20 px-2 py-2 rounded-base text-center font-bold text-gray-700 text-sm"
          >
            View more
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
