<div
  class="flex flex-col items-center justify-center bg-[#F7F8FA] p-4 border-t border-t-gray-300/50 rounded-b-lg"
>
  <div class="flex gap-x-3 bg-white rounded-base border border-gray-300/50 p-4 w-full">
    <span class="font-bold">Comments</span>
    <span class="bg-blue-100/70 text-light-blue px-2 py-1 rounded-full font-bold text-xs">
      {{ commentList().length }}
    </span>
  </div>
  <div class="my-3 w-full">
    @if (isLoading()) {
      <div class="bg-white rounded p-4 border border-gray-300/50">
        <p class="text-gray-400 font-semibold text-center">Loading comments...</p>
      </div>
    } @else {
      @for (item of commentList(); track item._id) {
        <app-single-comment
          [item]="item"
          [commentList]="commentList"
          [postCreatorId]="postCreatorId"
        ></app-single-comment>
      } @empty {
        <div
          class="bg-white rounded-lg p-8 border border-gray-300/50 flex flex-col items-center gap-y-2"
        >
          <div class="bg-blue-100/70 text-light-blue px-3 py-2.5 rounded-full font-bold text-2xl">
            <i class="fa-regular fa-comment"></i>
          </div>
          <p class="font-extrabold text-center text-xl">No comments yet</p>
          <p class="text-gray-400 text-center text-lg">Be the first to comment.</p>
        </div>
      }
      @if (hasMore()) {
        <div class="w-full flex justify-center">
          <button
            [disabled]="isLoadingMore()"
            (click)="viewMoreComments()"
            class="px-3 py-2 rounded-full bg-white font-bold text-sm text-gray-600 border border-gray-300 disabled:cursor-not-allowed cursor-pointer hover:bg-gray-200/50 transition duration-150"
          >
            @if (isLoadingMore()) {
              Loading...
            } @else {
              View more comments
            }
          </button>
        </div>
      }
    }
  </div>
  <form class="w-full" (submit)="onSubmitCommentForm($event)">
    <div class="py-2">
      <div class="flex gap-x-2">
        <img class="size-9 rounded-full object-cover" [src]="profileData().photo" alt="" />
        <div
          class="bg-[#F0F2F5] text-lg rounded-lg block w-full px-3 py-1 border border-gray-300/50 focus-within:bg-white"
        >
          <textarea
            [formControl]="commentControl"
            id="message"
            [(ngModel)]="postText"
            rows="2"
            class="bg-transparent resize-none text-base block w-full px-3 border-0 focus:border-none focus:ring-0 focus:bg-white placeholder:text-gray-600/60 placeholder:text-base"
            placeholder="Comment as {{ profileData().name }}..."
          ></textarea>
          <div class="flex justify-between pt-2">
            <div class="flex gap-x-1 items-center">
              <div class="flex gap-x-3">
                <label>
                  <div
                    class="py-1 px-1.5 hover:bg-gray-200 group/parent rounded-full transition duration-150 cursor-pointer"
                  >
                    <span
                      ><i
                        class="fa-regular fa-image text-gray-600 group-hover/parent:text-green-600 transition duration-150"
                      ></i
                    ></span>
                  </div>
                  <input
                    (change)="fileUploaded($event)"
                    id="commentInput"
                    type="file"
                    class="hidden"
                    accept="image/*"
                  />
                </label>
              </div>
              <div
                (click)="toggleShowEmoji($event)"
                class="py-1 px-1.5 hover:bg-gray-200 group/emoji rounded-full transition duration-150 cursor-pointer"
              >
                <span
                  ><i
                    class="fa-regular fa-face-smile text-gray-600 group-hover/emoji:text-orange transition duration-150"
                  ></i
                ></span>
              </div>
            </div>
            <div>
              <button
                [disabled]="!commentControl.value && uploadedFile === null"
                type="submit"
                class="main-btn size-9 ps-2.5 rounded-full font-extrabold flex justify-center"
              >
                <i class="fa-regular fa-paper-plane text-sm"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      @if (imagePath) {
        <div class="relative">
          <img class="rounded-lg" [src]="imagePath" alt="" />
          <div
            (click)="closeFile()"
            class="flex absolute right-2 top-3 cursor-pointer bg-black/60 rounded-full px-1 py-1.25 items-center"
          >
            <i class="fa-solid fa-x text-xs text-white"></i>
          </div>
        </div>
      }
    </div>
  </form>
</div>
@if (showEmojis) {
  <div
    class="absolute -translate-y-4 translate-x-4 z-99 mt-2 w-85 border border-gray-200 bg-white rounded-lg shadow-xl p-4 flex justify-center"
  >
    <emoji-mart
      (emojiSelect)="addEmoji($event)"
      [set]="'facebook'"
      [showPreview]="false"
      [isNative]="true"
      [darkMode]="false"
      [perLine]="8"
      class="facebook-picker"
    >
    </emoji-mart>
  </div>
}
